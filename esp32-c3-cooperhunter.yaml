esphome:
  name: cooper-hunter
  friendly_name: Cooper Hunter AC

esp32:
  board: lolin_c3_mini
  framework:
    type: arduino

logger:
  level: INFO

api:
  encryption:
    key: !secret cooper_hunter_api_key

ota:
  - platform: esphome
    password: !secret cooper_hunter_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

  ap:
    ssid: "Cooper-Hunter Fallback"
    password: "12345678"

captive_portal:

web_server:
  port: 80
  version: 3
  auth:
    username: !secret web_user
    password: !secret web_pass

external_components:
  - source:
      type: local
      path: components

i2c:
  sda: GPIO5
  scl: GPIO6
  scan: true

uart:
  id: ac_uart
  tx_pin: GPIO3
  rx_pin: GPIO4
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1

sensor:
  - platform: wifi_signal
    name: "Cooper Hunter WiFi Signal"
    id: wifi_signal_db
    update_interval: 60s


text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Cooper Hunter AC IP"
      id: device_ip

  - platform: template
    name: "Cooper Hunter Timer Remaining"
    id: ch_timer_remaining
    update_interval: 60s
    lambda: |-
      uint16_t t = id(ch_climate).timer_minutes();
      if (t == 0) return std::string("Off");
      char buf[16];
      snprintf(buf, sizeof(buf), "%u min", (unsigned) t);
      return std::string(buf);

font:
  - file: "gfonts://Roboto"
    id: ip_font
    size: 10

display:
  - platform: ssd1306_i2c
    model: "SSD1306 72x40"
    address: 0x3C
    rotation: 180°
    update_interval: 2s
    lambda: |-
      it.fill(COLOR_OFF);
      if (id(device_ip).has_state()) {
        it.printf(0, 0, id(ip_font), "%s", id(device_ip).state.c_str());
      } else {
        it.print(0, 0, id(ip_font), "Connecting...");
      }
      if (id(ch_climate).mode == esphome::climate::CLIMATE_MODE_OFF) {
        it.print(0, 13, id(ip_font), "OFF");
      } else {
        it.printf(0, 13, id(ip_font), "%.0f/%.0f C",
          id(ch_climate).target_temperature,
          id(ch_climate).current_temperature);
      }
      if (id(wifi_signal_db).has_state()) {
        it.printf(0, 26, id(ip_font), "WiFi %.0fdBm", id(wifi_signal_db).state);
      }

climate:
  - platform: cooper_hunter_ac
    uart_id: ac_uart
    name: "Cooper Hunter AC"
    id: ch_climate

number:
  - platform: template
    name: "Cooper Hunter Timer"
    id: ch_timer
    min_value: 0
    max_value: 1440
    step: 1
    unit_of_measurement: "min"
    mode: box
    optimistic: false
    lambda: return (float) id(ch_climate).timer_minutes();
    set_action:
      - lambda: id(ch_climate).set_timer((uint16_t)x);

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO9
      inverted: true
      mode: INPUT_PULLUP
    name: "Cooper Hunter Boot Button"
    on_press:
      then:
        - lambda: |-
            auto call = id(ch_climate).make_call();
            if (id(ch_climate).mode == esphome::climate::CLIMATE_MODE_OFF) {
              call.set_mode(id(ch_climate).last_active_mode());
            } else {
              call.set_mode(esphome::climate::CLIMATE_MODE_OFF);
            }
            call.perform();

switch:
  - platform: template
    name: "Cooper Hunter Display"
    id: ch_display
    optimistic: false
    lambda: |-
      return id(ch_climate).display_on();
    turn_on_action:
      - lambda: id(ch_climate).set_display(true);
    turn_off_action:
      - lambda: id(ch_climate).set_display(false);

  - platform: template
    name: "Cooper Hunter Health"
    id: ch_health
    optimistic: false
    lambda: |-
      return id(ch_climate).health_on();
    turn_on_action:
      - lambda: id(ch_climate).set_health(true);
    turn_off_action:
      - lambda: id(ch_climate).set_health(false);

  - platform: template
    name: "Cooper Hunter On Timer"
    id: ch_timer_on_mode
    optimistic: false
    lambda: return id(ch_climate).timer_on_mode();
    turn_on_action:
      - lambda: id(ch_climate).set_timer_on_mode(true);
    turn_off_action:
      - lambda: id(ch_climate).set_timer_on_mode(false);

  - platform: template
    name: "Cooper Hunter Debug Raw"
    id: ch_debug_raw
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: id(ch_climate).set_debug_raw(true);
    turn_off_action:
      - lambda: id(ch_climate).set_debug_raw(false);
